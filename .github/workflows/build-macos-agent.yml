name: Build macOS Agent

on:
  push:
    tags:
      - "v*"           # triggers on: git tag v1.0.1 && git push --tags
  workflow_dispatch:   # allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ -z "$VERSION" || "$VERSION" == "$GITHUB_REF_NAME" ]]; then
            VERSION="1.0.0"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Building version: $VERSION"

          # Patch version directly into project.pbxproj — more reliable than
          # xcodebuild command-line overrides which don't always win.
          sed -i '' \
            "s/MARKETING_VERSION = [^;]*/MARKETING_VERSION = $VERSION/" \
            macos-agent/TeamMonitorAgent.xcodeproj/project.pbxproj
          sed -i '' \
            "s/CURRENT_PROJECT_VERSION = [^;]*/CURRENT_PROJECT_VERSION = $VERSION/" \
            macos-agent/TeamMonitorAgent.xcodeproj/project.pbxproj
          echo "Patched project.pbxproj to version $VERSION"

      - name: Resolve Swift packages
        run: |
          xcodebuild \
            -resolvePackageDependencies \
            -project macos-agent/TeamMonitorAgent.xcodeproj \
            -scheme TeamMonitorAgent

      - name: Build app (ad-hoc signed)
        run: |
          xcodebuild \
            -project macos-agent/TeamMonitorAgent.xcodeproj \
            -scheme TeamMonitorAgent \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            OTHER_CODE_SIGN_FLAGS="--deep --options=runtime" \
            ONLY_ACTIVE_ARCH=NO \
            clean build

      - name: Locate .app
        run: |
          APP_PATH=$(find build/DerivedData -name "TeamMonitorAgent.app" | head -1)
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV
          echo "Found: $APP_PATH"

      - name: Sign frameworks + zip
        run: |
          # Sign each embedded framework individually first, then the app
          find "$APP_PATH/Contents/Frameworks" -name "*.framework" -o -name "*.dylib" 2>/dev/null \
            | while read -r f; do codesign --force --deep --sign - "$f" 2>/dev/null || true; done
          codesign --force --deep --sign - "$APP_PATH"
          # Clear any quarantine xattrs that crept in during build
          xattr -cr "$APP_PATH" 2>/dev/null || true
          cd "$(dirname "$APP_PATH")"
          zip -r "$GITHUB_WORKSPACE/TeamMonitorAgent.zip" TeamMonitorAgent.app
          echo "ZIP_PATH=$GITHUB_WORKSPACE/TeamMonitorAgent.zip" >> $GITHUB_ENV

      - name: Upload artifact (every build)
        uses: actions/upload-artifact@v4
        with:
          name: TeamMonitorAgent
          path: TeamMonitorAgent.zip
          retention-days: 30

      - name: Create GitHub Release (on tag only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: TeamMonitorAgent.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
